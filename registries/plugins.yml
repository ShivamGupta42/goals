version: 1
kind: plugins
plugins:
  github:
    label: GitHub
    description: Inspect repositories, pull requests, issues, and CI when remote context matters.
    use_when: [github, pull request, issue, ci, branch, commit, release]
    phases: [P2, P4]
    command_hint: Use the GitHub plugin or gh CLI when authenticated.
    risk: medium
    requires_user_approval: true
  browser:
    label: Browser
    description: Open and inspect local web dashboards or app UI when visual verification matters.
    use_when: [dashboard, html, browser, localhost, ui, visual, frontend]
    phases: [P3, P4]
    command_hint: Open generated dashboard or local app in the browser.
    risk: low
    requires_user_approval: false
  build-web-apps:
    label: Build Web Apps
    description: Use frontend implementation and testing workflows for web applications.
    use_when: [web, frontend, react, next, css, ui, javascript, typescript]
    phases: [P2, P3, P4]
    command_hint: Use frontend build/test guidance when the project is a web app.
    risk: low
    requires_user_approval: false
  codex-security:
    label: Codex Security
    description: Use deeper security review workflows for high-risk code or exposure changes.
    use_when: [security, threat, vulnerability, injection, secret, unsafe, supply chain]
    phases: [P2, P4]
    command_hint: Use a security scan workflow before accepting the phase.
    risk: medium
    requires_user_approval: false
  product-design:
    label: Product Design
    description: Clarify user experience, flows, and visual decisions when the goal affects end users.
    use_when: [user experience, ux, product, decision, visualization, dashboard, non technical]
    phases: [P1, P2, P4]
    command_hint: Use product design review for user-facing decisions.
    risk: low
    requires_user_approval: false
