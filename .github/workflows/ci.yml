name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run pytest -q
      - run: uv build --wheel --out-dir /tmp/goals-wheel-check
      - run: uv run python scripts/check_bundled_skill_wheel.py /tmp/goals-wheel-check/*.whl
      - run: uv run ruff check .
      - run: uv run goals validate || true
